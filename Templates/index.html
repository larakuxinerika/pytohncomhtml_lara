<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python + HTML</title>
    <style>
       body{
        font-family: Arial, sans-serif;
        background-color: #e3f2fd;
        text-align: center;
        padding: 50px;
       }
       h1{
        color: #1565c0;
       }
       .card{
        background: white;
        max-width: 600px;
        margin: auto;
        padding: 30px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
       }
       button{
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
        a{
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1> Integração Python + HTML</h1>
        <h2>Bem-vindo!</h2>
        <p><strong>Nome:</strong> {{nome}}</p>
        <p><strong>Curso:</strong> {{curso}}</p>
        <button onclick="mostrarMensagem()">
            Clique Aqui
        </button>
        
        <a href="/sobre">
            <button>Ir para sobre</button>
        </a>
    </div>
    <script>
        function mostrarMensagem(){
            alert("Parabens seu site esta funcionando.");
        }
    </script>
</body>
</html>
